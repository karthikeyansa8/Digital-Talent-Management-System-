{% extends 'base.html' %}
{% load static %}
{% block title %}Admin Login{% endblock title %}
{% block extra_css %}
  <style>
    .auth-shell {
      min-height: 100vh;
      background: radial-gradient(circle at 12% 12%, #f6d6ff 0, transparent 42%), radial-gradient(circle at 88% 82%, #ffd8e8 0, transparent 46%), #fff0f8;
    }

    .auth-card {
      border: 0;
      border-radius: 1.1rem;
      box-shadow: 0 1.1rem 2.7rem rgba(101, 23, 81, 0.18);
    }

    .auth-card .btn-primary {
      border: 0;
      background: linear-gradient(135deg, #bc3ca3, #e45aa5);
      box-shadow: 0 0.45rem 1.2rem rgba(188, 60, 163, 0.3);
    }

    .auth-card .btn-primary:hover {
      background: linear-gradient(135deg, #ab2f92, #d14e95);
    }
  </style>
{% endblock %}
{% block content %}
  <main class="auth-shell d-flex align-items-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5">
          <div class="card auth-card">
            <div class="card-body p-4 p-md-5">
              <h1 class="h3 fw-bold text-center mb-2">Admin Sign In</h1>
             

              <form method="post" >
                {% csrf_token %}
                {% include "includes/errors.html" %}

                <div class="mb-3">
                  <label for="email" class="form-label">Email address</label>
                  <input type="email" class="form-control form-control-lg" id="email" name="email" value="{{ form.email.value|default:'' }}" placeholder="you@example.com" required />
                </div>

                <div class="mb-3">
                  <div class="d-flex justify-content-between align-items-center">
                    <label for="password" class="form-label mb-0">Password</label>
                    <a href="{% url "forgot_password" %}" class="small text-decoration-none">Forgot password?</a>
                  </div>
                  <div class="input-group mt-2">
                    <input type="password" class="form-control form-control-lg" id="password" name="password" placeholder="Enter your password" required />
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePass('password', this)">Show</button>
                  </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 mt-2">Sign In</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="{% static 'loginscript.js' %}"></script>
{% endblock %}
