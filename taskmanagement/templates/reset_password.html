{% extends 'base.html' %}
{% block title %}Reset Password{% endblock title %}
{% block extra_css %}
  <style>
    .auth-shell {
      min-height: 100vh;
      background: radial-gradient(circle at 90% 10%, #d7fff2 0, transparent 40%), radial-gradient(circle at 10% 85%, #e7dcff 0, transparent 44%), #f8f9fa;
    }

    .auth-card {
      border: 0;
      border-radius: 1rem;
      box-shadow: 0 1rem 2.5rem rgba(16, 24, 40, 0.14);
    }
  </style>
{% endblock %}

{% block content %}
  <main class="auth-shell d-flex align-items-center py-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5">
          <div class="card auth-card">
            <div class="card-body p-4 p-md-5">
              <h1 class="h3 fw-bold text-center mb-2">Reset Password</h1>
              <p class="text-secondary text-center mb-4">Create a new password for your account.</p>

              <form method="post" >
                {% csrf_token %}
                {% include 'includes/errors.html' %}

                <div class="mb-3">
                  <label for="new_password" class="form-label">New Password</label>
                  <div class="input-group">
                    <input type="password" id="new_password" name="new_password" class="form-control form-control-lg" placeholder="Enter new password" required />
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePass('new_password', this)">Show</button>
                  </div>
                </div>

                <div class="mb-4">
                  <label for="confirm_password" class="form-label">Confirm Password</label>
                  <div class="input-group">
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control form-control-lg" placeholder="Confirm new password" required />
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePass('confirm_password', this)">Show</button>
                  </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">Reset Password</button>
                <a href="{% url 'login' %}" class="d-block text-center text-decoration-none">Back to Login</a>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    function togglePass(id, btn) {
      const input = document.getElementById(id)
      if (!input) return

      const isPassword = input.type === 'password'
      input.type = isPassword ? 'text' : 'password'
      btn.textContent = isPassword ? 'Hide' : 'Show'
    }
  </script>
{% endblock %}
