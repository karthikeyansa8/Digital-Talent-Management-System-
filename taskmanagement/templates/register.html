{% extends 'base.html' %}
{% load static %}
{% block title %}Register{% endblock title %}
{% block extra_css %}
  <style>
    .auth-shell {
      min-height: 100vh;
      background: radial-gradient(circle at 90% 10%, #d5fff5 0, transparent 38%), radial-gradient(circle at 15% 85%, #e9ddff 0, transparent 45%), #f8f9fa;
    }

    .auth-card {
      border: 0;
      border-radius: 1rem;
      box-shadow: 0 1rem 2.5rem rgba(16, 24, 40, 0.14);
    }
  </style>
{% endblock %}
{% block content %}
  <main class="auth-shell d-flex align-items-center py-4 py-md-5">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-11 col-md-9 col-lg-7 col-xl-6">
          <div class="card auth-card">
            <div class="card-body p-4 p-md-5">
              <h1 class="h3 fw-bold text-center mb-2">Create Account</h1>
              <p class="text-secondary text-center mb-4">
                Already have an account?
                <a href="{% url 'login' %}" class="text-decoration-none fw-semibold">Sign in</a>
              </p>

              <form method="post" >
                {% csrf_token %}
                {% include "includes/errors.html" %}

                <div class="row g-3 mb-3">
                  <div class="col-md-6">
                    <label class="form-label" for="fname">First name</label>
                    <input type="text" class="form-control form-control-lg" id="fname" name="first_name" value="{{ form.first_name.value|default:'' }}" placeholder="First name" required />
                  </div>
                  <div class="col-md-6">
                    <label class="form-label" for="lname">Last name</label>
                    <input type="text" class="form-control form-control-lg" id="lname" name="last_name" value="{{ form.last_name.value|default:'' }}" placeholder="Last name" required />
                  </div>
                </div>

                <div class="mb-3">
                  <label class="form-label" for="reg-email">Email address</label>
                  <input type="email" class="form-control form-control-lg" id="reg-email" name="email" value="{{ form.email.value|default:'' }}" placeholder="you@example.com" required />
                </div>

                <div class="mb-3">
                  <label class="form-label" for="reg-password">Password</label>
                  <div class="input-group">
                    <input type="password" class="form-control form-control-lg" id="reg-password" name="password" placeholder="Create a password" required />
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePass('reg-password', this)">Show</button>
                  </div>
                  <div class="progress mt-2" style="height: 6px;">
                    <div class="progress-bar" id="strength-fill" role="progressbar" style="width: 0%;" aria-valuemin="0" aria-valuemax="100"></div>
                  </div>
                  <small class="text-muted" id="strength-label"></small>
                </div>

                <div class="mb-4">
                  <label class="form-label" for="confirm-password">Confirm password</label>
                  <div class="input-group">
                    <input type="password" class="form-control form-control-lg" id="confirm-password" name="confirm_password" placeholder="Repeat password" required />
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePass('confirm-password', this)">Show</button>
                  </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100">Create Account</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="{% static 'registerscript.js' %}"></script>
{% endblock %}
